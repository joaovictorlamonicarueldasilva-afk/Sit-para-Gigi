<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Para a Giovanna</title>
    <meta
      name="description"
      content="Uma página especial com uma playlist e uma mensagem de carinho para a sua namorada."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-glow glow-one"></div>
    <div class="background-glow glow-two"></div>

    <main class="page-shell">
      <section class="hero-card">
        <div class="hero-text">
          <p class="eyebrow">💖 página especial</p>
          <h1>Para a Giovanna, com todo o meu carinho.</h1>
          <p class="hero-copy">
            Escolha o que você quer ver hoje: uma carta cheia de amor ou uma música para ouvir junto.
          </p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="musica.html">Ouvir música</a>
            <a class="btn btn-secondary" href="carta.html">Ler carta</a>
          </div>
        </div>

        <div class="hero-visual" aria-hidden="true">
          <div class="album-card">
            <div class="vinyl"></div>
            <div class="heart">♡</div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
